name: COBOL Bridge CI

on:
  push:
    paths:
      - "projects/cobol-modernization-bridge/**"
      - ".github/workflows/cobol-bridge-ci.yml"
  pull_request:
    paths:
      - "projects/cobol-modernization-bridge/**"
      - ".github/workflows/cobol-bridge-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/cobol-modernization-bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Parse sample fixed-width file
        run: |
          python src/parse_fixed_width.py \
            --input data/raw/customer_master.fwf \
            --out-json data/processed/customers.json \
            --out-csv data/processed/customers.csv

      - name: Run tests
        run: PYTHONPATH=. pytest -q
